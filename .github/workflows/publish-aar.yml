# Builds inspector_host_module with `flutter build aar` and uploads
# com.example.inspector_host_module + com.example.flutter_debug_inspector AARs
# to this repository's GitHub Packages Maven registry.
#
# Trigger: Actions tab → "Publish AAR to GitHub Packages" → Run workflow,
# or publish a GitHub Release.
#
# Consumers still need maven { url "https://storage.googleapis.com/download.flutter.io" }
# for io.flutter engine artifacts referenced by the POMs.
#
# Optional repo secret ANKIT_CRED (PAT with packages:write, etc.). If unset/empty,
# the workflow falls back to secrets.GITHUB_TOKEN for GH_TOKEN.

name: Publish AAR to GitHub Packages

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: flutter-build-runner
    env:
      GH_TOKEN: ${{ secrets.ANKIT_CRED != '' && secrets.ANKIT_CRED || secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ env.GH_TOKEN }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          token: ${{ env.GH_TOKEN }}

      - name: Require Maven on runner
        run: command -v mvn

      - name: flutter build aar
        run: |
          cd inspector_host_module
          flutter pub get
          flutter build aar

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ env.GH_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: ./tool/publish_github_packages.sh
