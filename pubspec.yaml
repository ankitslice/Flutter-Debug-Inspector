name: flutter_debug_inspector
description: A debug inspector for Flutter apps (hybrid and pure Flutter).
version: 1.0.0
homepage: https://github.com/yourorg/flutter_debug_inspector

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.flutter_debug_inspector
        pluginClass: FlutterDebugInspectorPlugin
